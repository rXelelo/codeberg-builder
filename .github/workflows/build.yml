name: Universal Codeberg Builder (GitHub Runner)

on:
  repository_dispatch:
    types: [codeberg-webhook]
  workflow_dispatch:
    inputs:
      codeberg_repo:
        description: 'Codeberg repository (username/repo)'
        required: true
      git_ref:
        description: 'Git ref (tag, branch, or commit)'
        required: true

env:
  CODEBERG_USERNAME: rXelelo

jobs:
  detect-and-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Parse Trigger Data
        id: parse
        run: |
          printf '\033[1;34m==> Stage: Parse Trigger Data\033[0m\n'
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            REPO="${{ github.event.client_payload.repository.full_name }}"
            REF="${{ github.event.client_payload.ref }}"
          else
            REPO="${{ github.event.inputs.codeberg_repo }}"
            REF="${{ github.event.inputs.git_ref }}"
          fi
          
          if [[ "$REF" == refs/tags/* ]]; then
            TAG="${REF#refs/tags/}"
            echo "is_tag=true" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          else
            echo "is_tag=false" >> $GITHUB_OUTPUT
          fi
          
          echo "repo=$REPO" >> $GITHUB_OUTPUT

      - name: Clone Codeberg Source
        if: steps.parse.outputs.is_tag == 'true'
        run: |
          printf '\033[1;34m==> Stage: Clone Codeberg Source\033[0m\n'
          git clone --depth 1 --branch ${{ steps.parse.outputs.tag }} \
            "https://oauth2:${{ secrets.CODEBERG_TOKEN }}@codeberg.org/${{ steps.parse.outputs.repo }}.git" source

      - name: Build & Sign PKGBUILD
        if: steps.parse.outputs.is_tag == 'true'
        run: |
          printf '\033[1;34m==> Stage: Build & Sign PKGBUILD\033[0m\n'
          cd source
          if [ ! -f "PKGBUILD" ]; then exit 0; fi

          docker run --rm \
            -v $(pwd):/workspace \
            -w /workspace \
            -e GPG_PRIVATE_KEY="${{ secrets.GPG_PRIVATE_KEY }}" \
            -e GPG_PASSPHRASE="${{ secrets.GPG_PASSPHRASE }}" \
            archlinux:base-devel \
            bash -c '
              pacman -Syu --noconfirm gnupg sudo
              useradd -m builder && echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
              chown -R builder:builder /workspace
              
              # Enable loopback for GPG
              su builder -c "mkdir -p ~/.gnupg && echo \"allow-loopback-pinentry\" > ~/.gnupg/gpg-agent.conf"
              su builder -c "echo \"pinentry-mode loopback\" > ~/.gnupg/gpg.conf"
              
              # Import Key
              echo "$GPG_PRIVATE_KEY" | su builder -c "gpg --batch --import"
              
              # Build
              su builder -c "makepkg -sf --noconfirm"
              
              # Sign (creating .sig files)
              for pkg in *.pkg.tar.zst; do
                [[ "$pkg" == *"-debug-"* ]] && continue
                echo "Signing $pkg..."
                echo "$GPG_PASSPHRASE" | su builder -c "gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 --detach-sign $pkg"
              done
            '
          
          # Move packages and .sig files (skipping debug)
          mkdir -p ../dist
          find . -maxdepth 1 -name "*.pkg.tar.zst*" ! -name "*-debug-*" -exec cp {} ../dist/ \;

      - name: Create release & Upload to Codeberg
        if: steps.parse.outputs.is_tag == 'true'
        run: |
          printf '\033[1;34m==> Stage: Create release & Upload to Codeberg\033[0m\n'
          REPO="${{ steps.parse.outputs.repo }}"
          TAG="${{ steps.parse.outputs.tag }}"
          REPO_NAME="${{ steps.parse.outputs.repo_name }}"
          # Capture build time in UTC
          BUILD_TIME=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          
          API_URL="https://codeberg.org/api/v1/repos/$REPO/releases"
          AUTH="Authorization: token ${{ secrets.CODEBERG_TOKEN }}"

          # Construct the release message body
          RELEASE_BODY="📦 **Build Result**\n\n**Name:** $REPO_NAME\n**Version:** $TAG\n**Build time:** $BUILD_TIME"

          echo "Creating release for $TAG..."
          
          # 1. Create the Release with the custom message
          RELEASE_JSON=$(curl -s -X POST "$API_URL" \
            -H "$AUTH" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"$TAG\",
              \"name\": \"Release $TAG\",
              \"body\": \"$RELEASE_BODY\",
              \"draft\": false,
              \"prerelease\": false
            }")
          
          RELEASE_ID=$(echo "$RELEASE_JSON" | jq -r '.id')
          
          # Fallback if release already exists
          if [ "$RELEASE_ID" == "null" ] || [ -z "$RELEASE_ID" ]; then
            echo "Release exists, updating body and fetching ID..."
            RELEASE_ID=$(curl -s -H "$AUTH" "$API_URL/tags/$TAG" | jq -r '.id')
            # Optional: Update existing release body
            curl -s -X PATCH "$API_URL/$RELEASE_ID" \
              -H "$AUTH" -H "Content-Type: application/json" \
              -d "{\"body\": \"$RELEASE_BODY\"}"
          fi

          # 2. Upload Artifacts (Factorio 1.3GB stable version)
          for file in dist/*; do
            [ -e "$file" ] || continue
            echo "Uploading $(basename "$file")..."
            curl -X POST "$API_URL/$RELEASE_ID/assets?name=$(basename "$file")" \
              -H "$AUTH" \
              -H "Content-Type: application/octet-stream" \
              -H "Expect: " \
              --retry 5 --retry-delay 15 --no-buffer \
              -T "$file"
          done

name: Build Fedora Packages

on:
  push:
    paths:
      - 'fedora/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Build Fedora packages
        run: |
          cd fedora
          for spec in *.spec; do
            if [ -f "$spec" ]; then
              echo "Building package from $spec"
              docker run --rm \
                -v "$PWD:/pkg" \
                fedora:latest \
                bash -c '
                  cd /pkg
                  dnf install -y rpm-build rpmdevtools dnf-plugins-core rpm-sign
                  rpmdev-setuptree
                  
                  # Copy spec file
                  cp *.spec ~/rpmbuild/SPECS/
                  
                  # Copy sources if they exist
                  [ -d sources ] && cp sources/* ~/rpmbuild/SOURCES/ || true
                  
                  # Install build dependencies
                  cd ~/rpmbuild/SPECS
                  dnf builddep -y *.spec
                  
                  # Build packages
                  rpmbuild -ba *.spec
                  
                  # Copy built packages back
                  cp ~/rpmbuild/RPMS/*/*.rpm /pkg/ 2>/dev/null || true
                  cp ~/rpmbuild/SRPMS/*.rpm /pkg/ 2>/dev/null || true
                '
            fi
          done
      
      - name: Clone repo repository
        run: |
          git clone https://codeberg.org/UniversalRepository/repo.git /tmp/repo
      
      - name: Check versions and copy new packages
        run: |
          cd fedora
          for pkg in *.rpm; do
            if [ -f "$pkg" ]; then
              pkgname=$(basename "$pkg")
              
              # Check if package exists in repo
              if [ -f "/tmp/repo/fedora/$pkgname" ]; then
                echo "Package $pkgname already exists with same version, skipping"
              else
                echo "New version of $pkgname, copying to repo"
                mkdir -p /tmp/repo/fedora
                cp "$pkg" /tmp/repo/fedora/
              fi
            fi
          done
      
      - name: Push to repo
        run: |
          cd /tmp/repo
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add fedora/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Fedora packages [CI]"
            git push https://oauth2:${{ secrets.CODEBERG_TOKEN }}@codeberg.org/UniversalRepository/repo.git main
          fi

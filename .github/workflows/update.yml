name: Update Void Templates

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  update-void:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --privileged
      volumes:
        - /dev:/dev

    steps:
      - name: Prepare container
        run: |
          printf '\033[1;34m==> Stage: Prepare container\033[0m\n'
          mkdir -p /etc/xbps.d
          cp /usr/share/xbps.d/*-repository-*.conf /etc/xbps.d/
          sed -i 's|repo-default|repo-ci|g' /etc/xbps.d/*-repository-*.conf
          xbps-install -Syu xbps
          xbps-install -yu
          xbps-install -y sudo bash curl git libstdc++ xtools
          useradd -G xbuilder -M builder

      - name: Clone Packages repository
        run: |
          printf '\033[1;34m==> Stage: Clone Packages repository\033[0m\n'
          git clone "https://oauth2:${{ secrets.CODEBERG_TOKEN }}@codeberg.org/UniversalRepository/Packages.git" /work/packages

      - name: Setup void-packages
        run: |
          printf '\033[1;34m==> Stage: Setup void-packages\033[0m\n'
          git clone --depth=1 https://github.com/void-linux/void-packages.git /work/void-packages
          cp -r /work/packages/void/* /work/void-packages/srcpkgs/
          chown -R builder:builder /work/void-packages

      - name: Prepare masterdir
        run: |
          printf '\033[1;34m==> Stage: Prepare masterdir\033[0m\n'
          cd /work/void-packages
          echo XBPS_BUILD_ENVIRONMENT=void-packages-ci >> etc/conf
          echo XBPS_CHROOT_CMD=uchroot >> etc/conf
          echo XBPS_ALLOW_RESTRICTED=yes >> etc/conf
          sudo -Eu builder ./xbps-src binary-bootstrap

      - name: Check and apply updates
        id: autoupdate
        run: |
          printf '\033[1;34m==> Stage: Check and apply updates\033[0m\n'
          UPDATED=""
          SHLIBS_UPDATED=false

          # First pass: check for updates and build packages
          for pkgdir in /work/packages/void/*; do
            [ -d "$pkgdir" ] || continue
            pkg=$(basename "$pkgdir")

            case "$pkg" in
              _*)
                echo "=> Skipping $pkg (starts with underscore)"
                continue
                ;;
            esac

            [ -f "$pkgdir/template" ] || continue
            echo "=> Checking $pkg..."

            UPDATE=$(sudo -Eu builder sh -c "cd /work/void-packages && ./xbps-src update-check $pkg 2>/dev/null" | tail -1 || true)
            echo "$UPDATE" | grep -q ' -> ' || continue

            OLD_VER=$(echo "$UPDATE" | awk -F' -> ' '{print $1}' | rev | cut -d- -f1 | rev)
            NEW_VER=$(echo "$UPDATE" | awk -F' -> ' '{print $2}' | rev | cut -d- -f1 | rev | tr -d '\n\r')

            [ -n "$NEW_VER" ] || continue
            [ "$OLD_VER" = "$NEW_VER" ] && continue

            echo "=> $pkg: $OLD_VER -> $NEW_VER"

            sed -i "s|^version=.*|version=${NEW_VER}|" "/work/packages/void/$pkg/template"
            sed -i "s|^revision=.*|revision=1|" "/work/packages/void/$pkg/template"

            cp "/work/packages/void/$pkg/template" "/work/void-packages/srcpkgs/$pkg/template"
            chown builder:builder "/work/void-packages/srcpkgs/$pkg/template"

            if sudo -Eu builder sh -c "cd /work/void-packages && xgensum -i srcpkgs/$pkg/template"; then
              cp "/work/void-packages/srcpkgs/$pkg/template" "/work/packages/void/$pkg/template"
              echo "=> $pkg checksum updated"
              
              # Try building the package to detect SONAME bumps
              echo "=> Building $pkg to check for SONAME bumps..."
              BUILD_OUTPUT=$(sudo -Eu builder sh -c "cd /work/void-packages && ./xbps-src pkg $pkg 2>&1" || true)
              
              if echo "$BUILD_OUTPUT" | grep -q "SONAME bump detected"; then
                echo "=> SONAME bump detected for $pkg, updating common/shlibs"
                
                # Extract SONAME information from error message
                SONAME_LINE=$(echo "$BUILD_OUTPUT" | grep -oP '(?<=please update common/shlibs with this line: ").*(?=")' || echo "$BUILD_OUTPUT" | sed -n '/please update common\/shlibs with this line:/,/^=> ERROR:/p' | grep -v "please update common/shlibs" | grep -v "^=> ERROR:" | grep "\.so\." | head -1 | sed 's/^=> ERROR: //' | xargs)
                
                if [ -n "$SONAME_LINE" ] && echo "$SONAME_LINE" | grep -q "\.so\."; then
                  echo "=> Adding to shlibs: $SONAME_LINE"
                  
                  # Extract library name
                  LIB_NAME=$(echo "$SONAME_LINE" | awk '{print $1}')
                  LIB_NAME_ESCAPED=$(echo "$LIB_NAME" | sed 's/\./\\./g')
                  
                  if [ -f "/work/packages/common/shlibs" ]; then
                    sed -i "/^${LIB_NAME_ESCAPED} /d" /work/packages/common/shlibs
                    echo "$SONAME_LINE" >> /work/packages/common/shlibs
                    sort -u /work/packages/common/shlibs -o /work/packages/common/shlibs
                    cp /work/packages/common/shlibs /work/void-packages/common/shlibs
                    SHLIBS_UPDATED=true
                    
                    # Retry build with updated shlibs
                    echo "=> Retrying build with updated shlibs..."
                    if sudo -Eu builder sh -c "cd /work/void-packages && ./xbps-src pkg $pkg 2>&1"; then
                      echo "=> $pkg built successfully after shlibs update"
                      UPDATED="$UPDATED $pkg"
                    else
                      echo "=> WARNING: build still failed for $pkg after shlibs update, rolling back"
                      git -C /work/packages checkout -- "void/$pkg/template" "common/shlibs"
                      SHLIBS_UPDATED=false
                    fi
                  fi
                else
                  echo "=> WARNING: could not extract SONAME line, rolling back"
                  git -C /work/packages checkout -- "void/$pkg/template"
                fi
              else
                echo "=> $pkg built successfully"
                UPDATED="$UPDATED $pkg"
              fi
            else
              echo "=> WARNING: checksum failed for $pkg, rolling back"
              git -C /work/packages checkout -- "void/$pkg/template"
            fi
          done

          # Second pass: if shlibs was updated, rebuild all packages listed in shlibs
          if [ "$SHLIBS_UPDATED" = true ]; then
            echo "=> Rebuilding all packages in common/shlibs due to SONAME changes..."
            
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              shlib_pkg=$(echo "$line" | awk '{print $2}' | cut -d- -f1)
              
              if [ -d "/work/packages/void/$shlib_pkg" ] && [ -f "/work/packages/void/$shlib_pkg/template" ]; then
                echo "=> Revbumping $shlib_pkg..."
                
                # Get current revision
                CURRENT_REV=$(grep "^revision=" "/work/packages/void/$shlib_pkg/template" | cut -d= -f2)
                NEW_REV=$((CURRENT_REV + 1))
                
                sed -i "s|^revision=.*|revision=${NEW_REV}|" "/work/packages/void/$shlib_pkg/template"
                cp "/work/packages/void/$shlib_pkg/template" "/work/void-packages/srcpkgs/$shlib_pkg/template"
                chown builder:builder "/work/void-packages/srcpkgs/$shlib_pkg/template"
                
                # Build the revbumped package
                if sudo -Eu builder sh -c "cd /work/void-packages && ./xbps-src pkg $shlib_pkg 2>&1"; then
                  echo "=> $shlib_pkg revbumped and built successfully"
                  echo "$UPDATED" | grep -q "$shlib_pkg" || UPDATED="$UPDATED $shlib_pkg"
                else
                  echo "=> WARNING: $shlib_pkg build failed after revbump"
                fi
              fi
            done < /work/packages/common/shlibs
          fi

          UPDATED=$(echo "$UPDATED" | xargs)
          if [ -n "$UPDATED" ]; then
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
            echo "updated_packages=$UPDATED" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            echo "updated_packages=" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updates
        if: steps.autoupdate.outputs.has_updates == 'true'
        run: |
          printf '\033[1;34m==> Stage: Commit and push updates\033[0m\n'
          cd /work/packages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add void/ common/shlibs
          git commit -m "void: auto-update ${{ steps.autoupdate.outputs.updated_packages }}"
          git push

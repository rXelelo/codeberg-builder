name: Update Void Templates

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  update-void:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --privileged
      volumes:
        - /dev:/dev

    steps:
      - name: Prepare container
        run: |
          printf '\033[1;34m==> Stage: Prepare container\033[0m\n'
          mkdir -p /etc/xbps.d
          cp /usr/share/xbps.d/*-repository-*.conf /etc/xbps.d/
          sed -i 's|repo-default|repo-ci|g' /etc/xbps.d/*-repository-*.conf
          xbps-install -Syu xbps
          xbps-install -yu
          xbps-install -y sudo bash curl git libstdc++ xtools
          useradd -G xbuilder -M builder

      - name: Clone Packages repository
        run: |
          printf '\033[1;34m==> Stage: Clone Packages repository\033[0m\n'
          git clone "https://oauth2:${{ secrets.CODEBERG_TOKEN }}@codeberg.org/UniversalRepository/Packages.git" /work/packages

      - name: Setup void-packages
        run: |
          printf '\033[1;34m==> Stage: Setup void-packages\033[0m\n'
          git clone --depth=1 https://github.com/void-linux/void-packages.git /work/void-packages
          rm -rf /work/void-packages/srcpkgs/ghostty-terminfo /work/void-packages/srcpkgs/ghostty
          cp -r /work/packages/void/* /work/void-packages/srcpkgs/
          chown -R builder:builder /work/void-packages

      - name: Prepare masterdir
        run: |
          printf '\033[1;34m==> Stage: Prepare masterdir\033[0m\n'
          cd /work/void-packages
          echo XBPS_BUILD_ENVIRONMENT=void-packages-ci >> etc/conf
          echo XBPS_CHROOT_CMD=uchroot >> etc/conf
          echo XBPS_ALLOW_RESTRICTED=yes >> etc/conf
          sudo -Eu builder ./xbps-src binary-bootstrap

      - name: Check and apply updates
        id: autoupdate
        run: |
          printf '\033[1;34m==> Stage: Check and apply updates\033[0m\n'
          UPDATED=""
          SHLIBS_UPDATED=false

          # First pass: check for updates and build packages
          for pkgdir in /work/packages/void/*; do
            [ -d "$pkgdir" ] || continue
            pkg=$(basename "$pkgdir")

            case "$pkg" in
              _*)
                echo "=> Skipping $pkg (starts with underscore)"
                continue
                ;;
            esac

            [ -f "$pkgdir/template" ] || continue
            echo "=> Checking $pkg..."

            UPDATE=$(sudo -Eu builder sh -c "cd /work/void-packages && ./xbps-src update-check $pkg 2>/dev/null" | tail -1 || true)
            echo "$UPDATE" | grep -q ' -> ' || continue

            OLD_VER=$(echo "$UPDATE" | awk -F' -> ' '{print $1}' | rev | cut -d- -f1 | rev)
            NEW_VER=$(echo "$UPDATE" | awk -F' -> ' '{print $2}' | rev | cut -d- -f1 | rev | tr -d '\n\r')

            [ -n "$NEW_VER" ] || continue
            [ "$OLD_VER" = "$NEW_VER" ] && continue

            echo "=> $pkg: $OLD_VER -> $NEW_VER"

            sed -i "s|^version=.*|version=${NEW_VER}|" "/work/packages/void/$pkg/template"
            sed -i "s|^revision=.*|revision=1|" "/work/packages/void/$pkg/template"

            cp "/work/packages/void/$pkg/template" "/work/void-packages/srcpkgs/$pkg/template"
            chown builder:builder "/work/void-packages/srcpkgs/$pkg/template"

            if sudo -Eu builder sh -c "cd /work/void-packages && xgensum -i srcpkgs/$pkg/template"; then
              cp "/work/void-packages/srcpkgs/$pkg/template" "/work/packages/void/$pkg/template"
              echo "=> $pkg checksum updated"
              UPDATED="$UPDATED $pkg"
            else
              echo "=> WARNING: checksum failed for $pkg, rolling back"
              git -C /work/packages checkout -- "void/$pkg/template"
            fi
          done

          # Second pass: update all packages listed in common/shlibs (in dependency order)
          echo "=> Checking and updating all packages from common/shlibs..."
          
          # List of packages to check from common/shlibs (in dependency order)
          # hyprutils must be first as other packages depend on it
          SHLIBS_PACKAGES="libspng libtoml++ sdbus-cpp hyprutils hyprlang hyprcursor aquamarine hyprgraphics"
          
          for shlib_pkg in $SHLIBS_PACKAGES; do
            if [ ! -d "/work/packages/void/$shlib_pkg" ] || [ ! -f "/work/packages/void/$shlib_pkg/template" ]; then
              echo "=> Skipping $shlib_pkg (not found in packages)"
              continue
            fi
            
            # Skip if already updated in first pass
            if echo "$UPDATED" | grep -q "$shlib_pkg"; then
              echo "=> $shlib_pkg already updated in first pass"
              continue
            fi
            
            echo "=> Checking $shlib_pkg for updates..."
            
            UPDATE=$(sudo -Eu builder sh -c "cd /work/void-packages && ./xbps-src update-check $shlib_pkg 2>/dev/null" | tail -1 || true)
            
            if echo "$UPDATE" | grep -q ' -> '; then
              OLD_VER=$(echo "$UPDATE" | awk -F' -> ' '{print $1}' | rev | cut -d- -f1 | rev)
              NEW_VER=$(echo "$UPDATE" | awk -F' -> ' '{print $2}' | rev | cut -d- -f1 | rev | tr -d '\n\r')
              
              if [ -n "$NEW_VER" ] && [ "$OLD_VER" != "$NEW_VER" ]; then
                echo "=> $shlib_pkg: $OLD_VER -> $NEW_VER"
                
                sed -i "s|^version=.*|version=${NEW_VER}|" "/work/packages/void/$shlib_pkg/template"
                sed -i "s|^revision=.*|revision=1|" "/work/packages/void/$shlib_pkg/template"
                
                cp "/work/packages/void/$shlib_pkg/template" "/work/void-packages/srcpkgs/$shlib_pkg/template"
                chown builder:builder "/work/void-packages/srcpkgs/$shlib_pkg/template"
                
                if sudo -Eu builder sh -c "cd /work/void-packages && xgensum -i srcpkgs/$shlib_pkg/template"; then
                  cp "/work/void-packages/srcpkgs/$shlib_pkg/template" "/work/packages/void/$shlib_pkg/template"
                  echo "=> $shlib_pkg checksum updated"
                  
                  # Build the package
                  echo "=> Building $shlib_pkg..."
                  if sudo -Eu builder sh -c "cd /work/void-packages && ./xbps-src pkg $shlib_pkg 2>&1"; then
                    echo "=> $shlib_pkg built successfully"
                    
                    # Install the package into masterdir so it's available for dependent packages
                    echo "=> Installing $shlib_pkg into masterdir..."
                    sudo -Eu builder sh -c "cd /work/void-packages && ./xbps-src install $shlib_pkg 2>&1" || true
                    
                    UPDATED="$UPDATED $shlib_pkg"
                  else
                    echo "=> WARNING: build failed for $shlib_pkg, rolling back"
                    git -C /work/packages checkout -- "void/$shlib_pkg/template"
                  fi
                else
                  echo "=> WARNING: checksum failed for $shlib_pkg, rolling back"
                  git -C /work/packages checkout -- "void/$shlib_pkg/template"
                fi
              fi
            fi
          done
          
          # Third pass: update common/shlibs for packages that were updated
          if [ -n "$UPDATED" ] && [ -f "/work/packages/common/shlibs" ]; then
            echo "=> Updating common/shlibs for updated packages..."
            
            for updated_pkg in $UPDATED; do
              # Check if this package has entries in common/shlibs
              if grep -q " ${updated_pkg}-" /work/packages/common/shlibs 2>/dev/null; then
                echo "=> Checking shlibs entries for $updated_pkg..."
                
                # Get new version from template
                NEW_PKG_VER=$(grep "^version=" "/work/packages/void/$updated_pkg/template" | cut -d= -f2)
                NEW_PKG_REV=$(grep "^revision=" "/work/packages/void/$updated_pkg/template" | cut -d= -f2)
                NEW_PKG_FULL="${updated_pkg}-${NEW_PKG_VER}_${NEW_PKG_REV}"
                
                # Update all shlibs entries for this package
                while IFS= read -r line; do
                  if echo "$line" | grep -q " ${updated_pkg}-"; then
                    OLD_ENTRY="$line"
                    LIB_NAME=$(echo "$line" | awk '{print $1}')
                    OLD_PKG_FULL=$(echo "$line" | awk '{print $2}')
                    
                    if [ "$OLD_PKG_FULL" != "$NEW_PKG_FULL" ]; then
                      echo "=> Updating shlibs: $LIB_NAME $OLD_PKG_FULL -> $NEW_PKG_FULL"
                      sed -i "s|^${LIB_NAME} ${OLD_PKG_FULL}|${LIB_NAME} ${NEW_PKG_FULL}|" /work/packages/common/shlibs
                      SHLIBS_UPDATED=true
                    fi
                  fi
                done < /work/packages/common/shlibs
              fi
            done
            
            if [ "$SHLIBS_UPDATED" = true ]; then
              cp /work/packages/common/shlibs /work/void-packages/common/shlibs
              echo "=> common/shlibs updated"
            fi
          fi

          UPDATED=$(echo "$UPDATED" | xargs)
          if [ -n "$UPDATED" ]; then
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
            echo "updated_packages=$UPDATED" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            echo "updated_packages=" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updates
        if: steps.autoupdate.outputs.has_updates == 'true'
        run: |
          printf '\033[1;34m==> Stage: Commit and push updates\033[0m\n'
          cd /work/packages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add void/ common/shlibs
          git commit -m "void: auto-update ${{ steps.autoupdate.outputs.updated_packages }}"
          git push

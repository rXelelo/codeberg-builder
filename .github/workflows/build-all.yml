name: Build All Packages

on:
  repository_dispatch:
    types: [build-arch, build-fedora, build-void]
  push:
    paths:
      - 'arch/**'
      - 'fedora/**'
      - 'void/**'
  workflow_dispatch:

jobs:
  build-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
      options: --privileged
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Clone Packages repository
        run: |
          pacman -Syu --noconfirm git
          git clone https://codeberg.org/UniversalRepository/Packages.git /tmp/packages
      
      - name: Build Arch packages
        run: |
          pacman -Syu --noconfirm gnupg sudo
          cd /tmp/packages/arch
          useradd -m builder && echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          
          for pkgdir in */; do
            pkgname=$(basename "$pkgdir")
            [[ "$pkgname" == _* ]] && continue
            if [ -f "$pkgdir/PKGBUILD" ]; then
              echo "Building Arch package: $pkgname"
              cd "$pkgdir"
              chown -R builder:builder .
              
              # Enable loopback for GPG
              su builder -c "mkdir -p ~/.gnupg && echo \"allow-loopback-pinentry\" > ~/.gnupg/gpg-agent.conf"
              su builder -c "echo \"pinentry-mode loopback\" > ~/.gnupg/gpg.conf"
              
              # Import Key if provided
              if [ -n "${{ secrets.GPG_PRIVATE_KEY }}" ]; then
                echo "${{ secrets.GPG_PRIVATE_KEY }}" | su builder -c "gpg --batch --import"
              fi
              
              # Build
              su builder -c "makepkg -sf --noconfirm"
              
              # Sign packages if GPG key is available
              if [ -n "${{ secrets.GPG_PRIVATE_KEY }}" ]; then
                for pkg in *.pkg.tar.zst; do
                  [[ "$pkg" == *"-debug-"* ]] && continue
                  [ -f "$pkg" ] || continue
                  echo "Signing $pkg..."
                  echo "${{ secrets.GPG_PASSPHRASE }}" | su builder -c "gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 --detach-sign $pkg"
                done
              fi
              
              cd ..
              echo "Built packages in $pkgdir:"
              ls -lh "$pkgdir"/*.pkg.tar.zst 2>/dev/null || echo "No packages found"
            fi
          done
      
      - name: Upload Arch packages
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arch-packages
          path: /tmp/packages/arch/
          retention-days: 7

  build-fedora:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
      options: --privileged
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Clone Packages repository
        run: |
          dnf install -y git
          git clone https://codeberg.org/UniversalRepository/Packages.git /tmp/packages
      
      - name: Build Fedora packages
        run: |
          dnf install -y rpm-build rpmdevtools dnf-plugins-core rpm-sign gnupg2 pinentry sudo spectool
          cd /tmp/packages/fedora
          useradd -m builder && echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          
          # Setup rpmbuild directory structure
          rpmdev-setuptree
          
          for spec in *.spec; do
            if [[ "$(basename "$spec")" == _* ]]; then
              echo "Skipping $spec (starts with underscore)"
              continue
            fi
            if [ -f "$spec" ]; then
              specname=$(basename "$spec" .spec)
              echo "Building Fedora package from: $spec"
              
              # Setup GPG if key is provided
              if [ -n "${{ secrets.GPG_PRIVATE_KEY }}" ]; then
                echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
                GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep sec | awk "{print \$2}" | cut -d"/" -f2 | head -1)
                
                # Configure RPM to use GPG
                echo "%_signature gpg" >> ~/.rpmmacros
                echo "%_gpg_name $GPG_KEY_ID" >> ~/.rpmmacros
              fi
              
              # Copy spec file
              cp "$spec" ~/rpmbuild/SPECS/
              
              # Copy sources if they exist locally
              [ -d sources ] && cp sources/* ~/rpmbuild/SOURCES/ || true
              
              # Download sources using spectool
              cd ~/rpmbuild/SPECS
              spectool -g -R "$spec" || true
              
              # Install build dependencies
              dnf builddep -y "$spec"
              
              # Build packages
              rpmbuild -ba "$spec"
              
              # Sign packages if GPG key is available
              if [ -n "${{ secrets.GPG_PRIVATE_KEY }}" ]; then
                for pkg in ~/rpmbuild/RPMS/*/*.rpm ~/rpmbuild/SRPMS/*.rpm; do
                  [ -f "$pkg" ] || continue
                  echo "Signing $pkg..."
                  echo "${{ secrets.GPG_PASSPHRASE }}" | rpmsign --addsign --key-id="$GPG_KEY_ID" "$pkg"
                done
              fi
              
              # Copy built packages back
              cp ~/rpmbuild/RPMS/*/*.rpm /tmp/packages/fedora/ 2>/dev/null || true
              cp ~/rpmbuild/SRPMS/*.rpm /tmp/packages/fedora/ 2>/dev/null || true
              
              echo "Built packages:"
              ls -lh /tmp/packages/fedora/*.rpm 2>/dev/null || echo "No packages found"
            fi
          done
      
      - name: Upload Fedora packages
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fedora-packages
          path: /tmp/packages/fedora/
          retention-days: 7

  build-void:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-buildroot-musl:latest
      options: --privileged
      volumes:
        - /dev:/dev
    steps:
      - name: Install dependencies
        run: |
          xbps-install -Syu xbps
          xbps-install -y git base-devel gnupg2
      
      - name: Checkout repository
        run: |
          git clone https://codeberg.org/UniversalRepository/codeberg-builder.git /workspace
          cd /workspace
          git checkout ${{ github.sha }}
      
      - name: Clone Packages repository
        run: |
          git clone https://codeberg.org/UniversalRepository/Packages.git /tmp/packages
      
      - name: Build Void packages
        run: |
          cd /tmp/packages/void
          useradd -m builder && usermod -G xbuilder builder
          
          # Setup void-packages
          git clone --depth=1 https://github.com/void-linux/void-packages.git /void-packages
          cd /void-packages
          chown -R builder:builder /void-packages
          sudo -Eu builder ./xbps-src binary-bootstrap
          
          cd /tmp/packages/void
          for pkgdir in */; do
            pkgname=$(basename "$pkgdir")
            if [[ "$pkgname" == _* ]]; then
              echo "Skipping $pkgdir (starts with underscore)"
              continue
            fi
            if [ -f "$pkgdir/template" ]; then
              echo "Building Void package: $pkgname"
              
              # Copy template to srcpkgs
              mkdir -p /void-packages/srcpkgs/$pkgname
              cp "$pkgdir/template" /void-packages/srcpkgs/$pkgname/
              chown -R builder:builder /void-packages/srcpkgs/$pkgname
              
              # Build package
              sudo -Eu builder sh -c "cd /void-packages && ./xbps-src pkg $pkgname"
              
              # Sign packages if GPG key is available
              if [ -n "${{ secrets.GPG_PRIVATE_KEY }}" ]; then
                echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
                GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep sec | awk "{print \$2}" | cut -d"/" -f2 | head -1)
                
                for pkg in /void-packages/hostdir/binpkgs/${pkgname}-*.xbps; do
                  [ -f "$pkg" ] || continue
                  echo "Signing $pkg..."
                  echo "${{ secrets.GPG_PASSPHRASE }}" | xbps-rindex --sign --signedby "$GPG_KEY_ID" "$pkg"
                done
              fi
              
              # Copy built packages to output
              find /void-packages/hostdir/binpkgs -name "${pkgname}-*.xbps" -exec cp {} /tmp/packages/void/ \;
              find /void-packages/hostdir/binpkgs -name "${pkgname}-*.xbps.sig*" -exec cp {} /tmp/packages/void/ \; 2>/dev/null || true
              
              echo "Built packages:"
              ls -lh /tmp/packages/void/*.xbps 2>/dev/null || echo "No packages found"
            fi
          done
      
      - name: Upload Void packages
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: void-packages
          path: /tmp/packages/void/
          retention-days: 7

  copy-and-push:
    runs-on: ubuntu-latest
    needs: [build-arch, build-fedora, build-void]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts
      
      - name: Clone repo repository
        run: |
          git clone https://codeberg.org/UniversalRepository/repo.git /tmp/repo
      
      - name: Copy packages to repo
        run: |
          mkdir -p /tmp/repo/arch /tmp/repo/fedora /tmp/repo/void
          
          # Copy Arch packages
          if [ -d /tmp/artifacts/arch-packages ]; then
            for pkg in /tmp/artifacts/arch-packages/*.pkg.tar.zst; do
              [ -f "$pkg" ] || continue
              pkgname=$(basename "$pkg")
              if [ ! -f "/tmp/repo/arch/$pkgname" ]; then
                cp "$pkg" /tmp/repo/arch/
                [ -f "$pkg.sig" ] && cp "$pkg.sig" /tmp/repo/arch/
              fi
            done
          fi
          
          # Copy Fedora packages
          if [ -d /tmp/artifacts/fedora-packages ]; then
            for pkg in /tmp/artifacts/fedora-packages/*.rpm; do
              [ -f "$pkg" ] || continue
              pkgname=$(basename "$pkg")
              if [ ! -f "/tmp/repo/fedora/$pkgname" ]; then
                cp "$pkg" /tmp/repo/fedora/
              fi
            done
          fi
          
          # Copy Void packages
          if [ -d /tmp/artifacts/void-packages ]; then
            for pkg in /tmp/artifacts/void-packages/*.xbps; do
              [ -f "$pkg" ] || continue
              pkgname=$(basename "$pkg")
              if [ ! -f "/tmp/repo/void/$pkgname" ]; then
                cp "$pkg" /tmp/repo/void/
                [ -f "$pkg.sig" ] && cp "$pkg.sig" /tmp/repo/void/
                [ -f "$pkg.sig2" ] && cp "$pkg.sig2" /tmp/repo/void/
              fi
            done
          fi
      
      - name: Push all changes to repo
        run: |
          cd /tmp/repo
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add arch/ fedora/ void/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update packages [CI] - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push https://oauth2:${{ secrets.CODEBERG_TOKEN }}@codeberg.org/UniversalRepository/repo.git main
          fi

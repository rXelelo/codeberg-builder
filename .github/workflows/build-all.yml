name: Build All Packages

on:
  repository_dispatch:
    types: [build-arch, build-fedora, build-void]
  push:
    paths:
      - 'arch/**'
      - 'fedora/**'
      - 'void/**'
  workflow_dispatch:
    inputs:
      skip_packages:
        description: 'Optional comma-separated package names to skip (without leading underscore)'
        required: false
        default: ''
      skip_if_in_other_repos:
        description: 'Skip package build if same package exists in other distro repos'
        required: false
        type: boolean
        default: false

run-name: ${{ github.event.client_payload.commit_message || github.event.client_payload.commit_sha || github.event.head_commit.message || github.ref_name }}

jobs:
  build-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
      options: --privileged
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Clone Packages and Repo
        run: |
          pacman -Syu --noconfirm git
          git clone https://codeberg.org/UniversalRepository/Packages.git /tmp/packages
          git clone https://codeberg.org/UniversalRepository/repo.git /tmp/repo
      
      - name: Build Arch packages
        shell: bash
        run: |
          SKIP_INPUT="${{ github.event.inputs.skip_packages }}"
          SKIP_IF_OTHER="${{ github.event.inputs.skip_if_in_other_repos }}"

          pacman -Syu --noconfirm gnupg sudo
          cd /tmp/packages/arch
          useradd -m builder && echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          
          for pkgdir in */; do
            pkgname=$(basename "$pkgdir")
            [[ "$pkgname" == _* ]] && continue
            [ -f "$pkgdir/PKGBUILD" ] || continue

            # Skip packages provided from workflow_dispatch input
            if [ -n "$SKIP_INPUT" ]; then
              echo ",$SKIP_INPUT," | grep -q ",$pkgname," && {
                echo "Package $pkgname is in skip list, skipping"
                continue
              }
            fi
            
            # Extract version and revision from PKGBUILD
            source "$pkgdir/PKGBUILD"
            pkgver_full="${pkgname}-${pkgver}-${pkgrel}"
            
            # Check if package already exists in repo
            if ls /tmp/repo/arch/${pkgname}-*-*.pkg.tar.zst 1>/dev/null 2>&1; then
              echo "Package $pkgver_full already exists in repo, skipping"
              continue
            fi

            # Optional: skip if package exists in other repos
            if [ "$SKIP_IF_OTHER" = "true" ]; then
              if ls /tmp/repo/fedora/${pkgname}-*.rpm 1>/dev/null 2>&1 || ls /tmp/repo/void/${pkgname}-*.xbps 1>/dev/null 2>&1; then
                echo "Package $pkgname exists in other repos, skipping"
                continue
              fi
            fi
            
            echo "Building Arch package: $pkgver_full"
            cd "$pkgdir"
            chown -R builder:builder .
            
            # Enable loopback for GPG
            su builder -c "mkdir -p ~/.gnupg && echo \"allow-loopback-pinentry\" > ~/.gnupg/gpg-agent.conf"
            su builder -c "echo \"pinentry-mode loopback\" > ~/.gnupg/gpg.conf"
            
            # Import Key if provided
            if [ -n "${{ secrets.GPG_PRIVATE_KEY }}" ]; then
              echo "${{ secrets.GPG_PRIVATE_KEY }}" | su builder -c "gpg --batch --import"
            fi
            
            # Build
            su builder -c "makepkg -sf --noconfirm"
            
            # Sign packages if GPG key is available
            if [ -n "${{ secrets.GPG_PRIVATE_KEY }}" ]; then
              for pkg in *.pkg.tar.zst; do
                [[ "$pkg" == *"-debug-"* ]] && continue
                [ -f "$pkg" ] || continue
                echo "Signing $pkg..."
                echo "${{ secrets.GPG_PASSPHRASE }}" | su builder -c "gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 --detach-sign $pkg"
              done
            fi
            
            cd ..
            echo "Built packages in $pkgdir:"
            ls -lh "$pkgdir"/*.pkg.tar.zst 2>/dev/null || echo "No packages found"
          done
      
      - name: Upload Arch packages
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arch-packages
          path: |
            /tmp/packages/arch/**/*.pkg.tar.zst
            /tmp/packages/arch/**/*.pkg.tar.zst.sig
          if-no-files-found: ignore
          retention-days: 7

  build-fedora:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
      options: --privileged
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Clone Packages and Repo
        run: |
          dnf install -y git
          git clone https://codeberg.org/UniversalRepository/Packages.git /tmp/packages
          git clone https://codeberg.org/UniversalRepository/repo.git /tmp/repo
      
      - name: Build Fedora packages
        shell: bash
        run: |
          SKIP_INPUT="${{ github.event.inputs.skip_packages }}"
          SKIP_IF_OTHER="${{ github.event.inputs.skip_if_in_other_repos }}"

          dnf install -y rpm-build rpmdevtools dnf-plugins-core rpm-sign gnupg2 pinentry sudo spectool
          FEDORA_DIR=/tmp/packages/fedora
          cd "$FEDORA_DIR"
          useradd -m builder && echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          
          # Setup rpmbuild directory structure
          rpmdev-setuptree
          
          for spec in $(ls "$FEDORA_DIR"/*.spec 2>/dev/null | xargs -n1 basename); do
            case "$(basename "$spec")" in
              _*)
                echo "Skipping $spec (starts with underscore)"
                continue
                ;;
            esac
            spec_path="$FEDORA_DIR/$spec"
            [ -f "$spec_path" ] || continue
            
            # Extract version and release from spec file
            specname=$(basename "$spec" .spec)
            pkgver=$(grep "^Version:" "$spec_path" | awk '{print $2}')
            pkgrel=$(grep "^Release:" "$spec_path" | awk '{print $2}' | cut -d'%' -f1)
            pkgver_full="${specname}-${pkgver}-${pkgrel}"

            # Skip packages provided from workflow_dispatch input
            if [ -n "$SKIP_INPUT" ]; then
              echo ",$SKIP_INPUT," | grep -q ",$specname," && {
                echo "Package $specname is in skip list, skipping"
                continue
              }
            fi
            
            # Check if exact version-release already exists in repo
            if ls /tmp/repo/fedora/${specname}-${pkgver}-${pkgrel}.fc*.x86_64.rpm 1>/dev/null 2>&1; then
              echo "Package $pkgver_full already exists in repo, skipping"
              continue
            fi

            # Optional: skip if package exists in other repos
            if [ "$SKIP_IF_OTHER" = "true" ]; then
              if ls /tmp/repo/arch/${specname}-*.pkg.tar.zst 1>/dev/null 2>&1 || ls /tmp/repo/void/${specname}-*.xbps 1>/dev/null 2>&1; then
                echo "Package $specname exists in other repos, skipping"
                continue
              fi
            fi
            
             echo "Building Fedora package from: $pkgver_full"
             
             # Clean build directories for this build (but keep RPMS/SRPMS)
             rm -rf ~/rpmbuild/BUILD/* ~/rpmbuild/BUILDROOT/*
             
             # Setup GPG if key is provided
            if [ -n "${{ secrets.GPG_PRIVATE_KEY }}" ]; then
              echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
              GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep sec | awk "{print \$2}" | cut -d"/" -f2 | head -1)
              
              # Configure RPM to use GPG
              echo "%_signature gpg" >> ~/.rpmmacros
              echo "%_gpg_name $GPG_KEY_ID" >> ~/.rpmmacros
            fi
            
            # Copy spec file
            cp "$spec_path" ~/rpmbuild/SPECS/
            
            # Copy sources if they exist locally
            [ -d sources ] && cp sources/* ~/rpmbuild/SOURCES/ || true
            
            # Download sources using spectool
            cd ~/rpmbuild/SPECS
            spectool -g -R "$spec" || true
            
            # Install build dependencies
            dnf builddep -y "$spec"
            
            # Build packages
            rpmbuild -ba "$spec"

            # Return to Fedora specs directory for next iteration
            cd "$FEDORA_DIR"
            
            # Skip GPG signing (not supported in container)
            
            # Copy built packages back
            cp ~/rpmbuild/RPMS/*/*.rpm /tmp/packages/fedora/ 2>/dev/null || true
            cp ~/rpmbuild/SRPMS/*.rpm /tmp/packages/fedora/ 2>/dev/null || true
            
            echo "Built packages:"
            ls -lh /tmp/packages/fedora/*.rpm 2>/dev/null || echo "No packages found"
          done
      
      - name: Upload Fedora packages
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fedora-packages
          path: /tmp/packages/fedora/
          retention-days: 7

  build-void:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --privileged
      volumes:
        - /dev:/dev
    steps:
      - name: Prepare container
        run: |
          mkdir -p /etc/xbps.d && cp /usr/share/xbps.d/*-repository-*.conf /etc/xbps.d/
          sed -i 's|repo-default|repo-ci|g' /etc/xbps.d/*-repository-*.conf
          xbps-install -Syu xbps
          xbps-install -y sudo bash curl git libstdc++
          useradd -G xbuilder -M builder
      
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Clone Packages and Repo
        run: |
          git clone https://codeberg.org/UniversalRepository/Packages.git /tmp/packages
          git clone https://codeberg.org/UniversalRepository/repo.git /tmp/repo
      
      - name: Build Void packages
        run: |
          SKIP_INPUT="${{ github.event.inputs.skip_packages }}"
          SKIP_IF_OTHER="${{ github.event.inputs.skip_if_in_other_repos }}"

          VOID_DIR=/tmp/packages/void
          git clone --depth=1 https://github.com/void-linux/void-packages.git /void-packages
          cd /void-packages
          echo XBPS_BUILD_ENVIRONMENT=void-packages-ci >> etc/conf
          echo XBPS_CHROOT_CMD=uchroot >> etc/conf
          echo XBPS_ALLOW_RESTRICTED=yes >> etc/conf
          cp -r "$VOID_DIR"/* srcpkgs/
          chown -R builder:builder /void-packages
          sudo -Eu builder ./xbps-src binary-bootstrap
          
          for pkgdir in "$VOID_DIR"/*; do
            [ -d "$pkgdir" ] || continue
            pkgname=$(basename "$pkgdir")
            case "$pkgname" in
              _*)
              echo "Skipping $pkgdir (starts with underscore)"
              continue
              ;;
            esac
            [ -f "$pkgdir/template" ] || continue

            # Skip packages provided from workflow_dispatch input
            if [ -n "$SKIP_INPUT" ]; then
              echo ",$SKIP_INPUT," | grep -q ",$pkgname," && {
                echo "Package $pkgname is in skip list, skipping"
                continue
              }
            fi
            
            # Extract version and revision from template without sourcing
            version=$(grep '^version=' "$pkgdir/template" | head -1 | cut -d'=' -f2)
            revision=$(grep '^revision=' "$pkgdir/template" | head -1 | cut -d'=' -f2)
            pkgver_full="${pkgname}-${version}_${revision}"
            
            # Check if exact version already exists in repo
            if ls /tmp/repo/void/${pkgname}-${version}_${revision}*.xbps 1>/dev/null 2>&1; then
              echo "Package $pkgver_full already exists in repo, skipping"
              continue
            fi

            # Optional: skip if package exists in other repos
            if [ "$SKIP_IF_OTHER" = "true" ]; then
              if ls /tmp/repo/arch/${pkgname}-*.pkg.tar.zst 1>/dev/null 2>&1 || ls /tmp/repo/fedora/${pkgname}-*.rpm 1>/dev/null 2>&1; then
                echo "Package $pkgname exists in other repos, skipping"
                continue
              fi
            fi
            
            echo "Building Void package: $pkgver_full"
            
            # Copy template to srcpkgs
            mkdir -p /void-packages/srcpkgs/$pkgname
            cp "$pkgdir/template" /void-packages/srcpkgs/$pkgname/
            chown -R builder:builder /void-packages/srcpkgs/$pkgname
            
            # Build package
            sudo -Eu builder sh -c "cd /void-packages && ./xbps-src -E pkg $pkgname"
            
            # Skip GPG signing (not supported in container)
            
            # Copy built packages to output
            find /void-packages/hostdir/binpkgs -name "${pkgname}-*.xbps" -exec cp {} /tmp/packages/void/ \;
            find /void-packages/hostdir/binpkgs -name "${pkgname}-*.xbps.sig*" -exec cp {} /tmp/packages/void/ \; 2>/dev/null || true
            
            echo "Built packages:"
            ls -lh /tmp/packages/void/*.xbps 2>/dev/null || echo "No packages found"
          done
      
      - name: Upload Void packages
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: void-packages
          path: /tmp/packages/void/
          retention-days: 7

  copy-and-push:
    runs-on: ubuntu-latest
    needs: [build-arch, build-fedora, build-void]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts
      
      - name: Clone repo repository
        run: |
          git clone https://codeberg.org/UniversalRepository/repo.git /tmp/repo
      
      - name: Copy packages to repo
        run: |
          set -euo pipefail
          shopt -s nullglob globstar

          mkdir -p /tmp/repo/arch /tmp/repo/fedora /tmp/repo/void

          parse_arch_pkg() {
            local file="$1"
            local base arch rel ver name tmp
            base="${file%.pkg.tar.zst}"
            arch="${base##*-}"
            tmp="${base%-*}"
            rel="${tmp##*-}"
            tmp="${tmp%-*}"
            ver="${tmp##*-}"
            name="${tmp%-*}"
            printf '%s|%s-%s|%s\n' "$name" "$ver" "$rel" "$arch"
          }

          parse_fedora_pkg() {
            local file="$1"
            local base arch rel ver name tmp
            base="${file%.rpm}"
            arch="${base##*.}"
            tmp="${base%.*}"
            rel="${tmp##*-}"
            tmp="${tmp%-*}"
            ver="${tmp##*-}"
            name="${tmp%-*}"
            printf '%s|%s-%s|%s\n' "$name" "$ver" "$rel" "$arch"
          }

          parse_void_pkg() {
            local file="$1"
            local base arch verrev name tmp
            base="${file%.xbps}"
            arch="${base##*.}"
            tmp="${base%.*}"
            verrev="${tmp##*-}"
            name="${tmp%-*}"
            printf '%s|%s|%s\n' "$name" "$verrev" "$arch"
          }

          echo "Artifact directories present:"
          ls -la /tmp/artifacts || true
          
          # Copy Arch packages
          if [ -d /tmp/artifacts/arch-packages ]; then
            for pkg in /tmp/artifacts/arch-packages/**/*.pkg.tar.zst; do
              pkgfile=$(basename "$pkg")
              IFS='|' read -r name verrel _ <<< "$(parse_arch_pkg "$pkgfile")"
              skip_copy=false

              for existing in /tmp/repo/arch/*.pkg.tar.zst; do
                existing_file=$(basename "$existing")
                IFS='|' read -r existing_name existing_verrel _ <<< "$(parse_arch_pkg "$existing_file")"
                [ "$existing_name" = "$name" ] || continue

                if [ "$existing_verrel" = "$verrel" ]; then
                  echo "Arch: $pkgfile already present with same version ($verrel), skipping"
                  skip_copy=true
                else
                  echo "Arch: replacing $existing_file with $pkgfile"
                  rm -f "$existing" "$existing.sig"
                fi
              done

              if [ "$skip_copy" = false ]; then
                cp "$pkg" /tmp/repo/arch/
                if [ -f "$pkg.sig" ]; then
                  cp "$pkg.sig" /tmp/repo/arch/
                fi
              fi
            done
          fi
          
          # Copy Fedora packages
          if [ -d /tmp/artifacts/fedora-packages ]; then
            for pkg in /tmp/artifacts/fedora-packages/*.rpm; do
              pkgfile=$(basename "$pkg")
              IFS='|' read -r name verrel _ <<< "$(parse_fedora_pkg "$pkgfile")"
              skip_copy=false

              for existing in /tmp/repo/fedora/*.rpm; do
                existing_file=$(basename "$existing")
                IFS='|' read -r existing_name existing_verrel _ <<< "$(parse_fedora_pkg "$existing_file")"
                [ "$existing_name" = "$name" ] || continue

                if [ "$existing_verrel" = "$verrel" ]; then
                  echo "Fedora: $pkgfile already present with same version ($verrel), skipping"
                  skip_copy=true
                else
                  echo "Fedora: replacing $existing_file with $pkgfile"
                  rm -f "$existing"
                fi
              done

              if [ "$skip_copy" = false ]; then
                cp "$pkg" /tmp/repo/fedora/
              fi
            done
          fi
          
          # Copy Void packages
          if [ -d /tmp/artifacts/void-packages ]; then
            for pkg in /tmp/artifacts/void-packages/*.xbps; do
              pkgfile=$(basename "$pkg")
              IFS='|' read -r name verrev _ <<< "$(parse_void_pkg "$pkgfile")"
              skip_copy=false

              for existing in /tmp/repo/void/*.xbps; do
                existing_file=$(basename "$existing")
                IFS='|' read -r existing_name existing_verrev _ <<< "$(parse_void_pkg "$existing_file")"
                [ "$existing_name" = "$name" ] || continue

                if [ "$existing_verrev" = "$verrev" ]; then
                  echo "Void: $pkgfile already present with same version ($verrev), skipping"
                  skip_copy=true
                else
                  echo "Void: replacing $existing_file with $pkgfile"
                  rm -f "$existing" "$existing.sig" "$existing.sig2"
                fi
              done

              if [ "$skip_copy" = false ]; then
                cp "$pkg" /tmp/repo/void/
                if [ -f "$pkg.sig" ]; then
                  cp "$pkg.sig" /tmp/repo/void/
                fi
                if [ -f "$pkg.sig2" ]; then
                  cp "$pkg.sig2" /tmp/repo/void/
                fi
              fi
            done
          fi

          echo "Copied package counts:"
          echo "Arch: $(ls -1 /tmp/repo/arch/*.pkg.tar.zst 2>/dev/null | wc -l)"
          echo "Fedora: $(ls -1 /tmp/repo/fedora/*.rpm 2>/dev/null | wc -l)"
          echo "Void: $(ls -1 /tmp/repo/void/*.xbps 2>/dev/null | wc -l)"
      
      - name: Create repository metadata
        run: |
          # Create Arch repository
          if [ -d /tmp/repo/arch ] && ls /tmp/repo/arch/*.pkg.tar.zst 1>/dev/null 2>&1; then
            echo "Creating Arch repository..."
            docker run --rm -v /tmp/repo/arch:/repo archlinux:base-devel bash -c "
              pacman -Sy --noconfirm pacman-contrib
              cd /repo
              repo-add archrepo.db.tar.gz *.pkg.tar.zst
            " || echo "Arch repo creation skipped"
          fi
          
          # Create Fedora repository
          if [ -d /tmp/repo/fedora ] && ls /tmp/repo/fedora/*.rpm 1>/dev/null 2>&1; then
            echo "Creating Fedora repository..."
            docker run --rm -v /tmp/repo/fedora:/repo fedora:latest bash -c "
              dnf install -y createrepo_c
              cd /repo
              createrepo_c .
            " || echo "Fedora repo creation skipped"
          fi
          
          # Create Void repository
          if [ -d /tmp/repo/void ] && ls /tmp/repo/void/*.xbps 1>/dev/null 2>&1; then
            echo "Creating Void repository..."
            docker run --rm -v /tmp/repo/void:/repo ghcr.io/void-linux/void-glibc-full:latest sh -c "
              xbps-install -Syu xbps
              cd /repo
              XBPS_ARCH=x86_64 xbps-rindex -a *.xbps
            " || echo "Void repo creation skipped"

            # Sign Void packages and repository index (optional)
            if [ -n "${{ secrets.XBPS_PRIVATE_KEY }}" ]; then
              echo "Signing Void packages and repository metadata..."
              mkdir -p /tmp/xbps-sign
              printf '%s\n' "${{ secrets.XBPS_PRIVATE_KEY }}" > /tmp/xbps-sign/id_rsa
              chmod 600 /tmp/xbps-sign/id_rsa

              docker run --rm \
                -v /tmp/repo/void:/repo \
                -v /tmp/xbps-sign:/sign \
                ghcr.io/void-linux/void-glibc-full:latest sh -c "
                  xbps-install -Syu xbps
                  cd /repo
                  for pkg in *.xbps; do
                    xbps-rindex --privkey /sign/id_rsa -S /repo/\$pkg
                  done
                  XBPS_ARCH=x86_64 xbps-rindex --signedby 'Universal Repository CI <ci@universalrepo.local>' --privkey /sign/id_rsa -s /repo
                " || echo "Void signing skipped"

              rm -rf /tmp/xbps-sign
            else
              echo "XBPS_PRIVATE_KEY secret not set; skipping Void package signing"
            fi
          fi
      
      - name: Push all changes to repo
        run: |
          cd /tmp/repo
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add arch/ fedora/ void/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update packages [CI] - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            BRANCH=$(git rev-parse --abbrev-ref HEAD)
            git push https://oauth2:${{ secrets.CODEBERG_TOKEN }}@codeberg.org/UniversalRepository/repo.git $BRANCH
          fi
